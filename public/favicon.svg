<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="trophyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="baseGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1e293b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f172a;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Trophy Cup -->
  <g transform="translate(50, 50)">
    <!-- Cup Body -->
    <ellipse cx="0" cy="-10" rx="25" ry="8" fill="url(#trophyGrad)"/>
    <path d="M -25,-10 L -25,15 Q -25,25 0,25 Q 25,25 25,15 L 25,-10 Z" fill="url(#trophyGrad)"/>
    
    <!-- Left Handle -->
    <path d="M -25,-5 Q -35,5 -25,15" stroke="url(#trophyGrad)" stroke-width="4" fill="none" stroke-linecap="round"/>
    
    <!-- Right Handle -->
    <path d="M 25,-5 Q 35,5 25,15" stroke="url(#trophyGrad)" stroke-width="4" fill="none" stroke-linecap="round"/>
    
    <!-- Base -->
    <rect x="-12" y="25" width="24" height="8" fill="url(#baseGrad)"/>
    <rect x="-18" y="33" width="36" height="6" rx="2" fill="url(#trophyGrad)"/>
    
    <!-- Star on Cup -->
    <polygon points="0,-5 2,1 8,1 4,5 6,11 0,8 -6,11 -4,5 -8,1 -2,1" fill="#fbbf24" transform="scale(0.6)"/>
  </g>
</svg>
