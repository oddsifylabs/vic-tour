<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VIC Tour — Event Details</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="icon" type="image/png" href="/favicon.png">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg-primary: #0a0e1a;
      --bg-secondary: #111625;
      --bg-card: rgba(17, 22, 37, 0.8);
      --bg-glass: rgba(59, 130, 246, 0.1);
      --accent-blue: #3b82f6;
      --accent-purple: #8b5cf6;
      --accent-cyan: #06b6d4;
      --gradient: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 50%, #06b6d4 100%);
      --text-primary: #e0e0e0;
      --text-secondary: #9ca3af;
      --success: #10b981;
      --warning: #f59e0b;
      --danger: #ef4444;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      line-height: 1.6;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Particle Background */
    #particles {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      pointer-events: none;
    }

    /* Main Container */
    .container {
      position: relative;
      z-index: 1;
      max-width: 1200px;
      margin: 0 auto;
      padding: 2rem;
    }

    /* Back Button */
    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.75rem 1.5rem;
      background: var(--bg-card);
      border: 1px solid rgba(59, 130, 246, 0.2);
      border-radius: 8px;
      color: var(--text-primary);
      text-decoration: none;
      font-weight: 500;
      margin-bottom: 2rem;
      transition: all 0.3s ease;
    }

    .back-btn:hover {
      background: var(--bg-glass);
      border-color: var(--accent-blue);
    }

    /* Header */
    .event-header {
      background: var(--bg-card);
      padding: 2rem;
      border-radius: 16px;
      border: 1px solid rgba(59, 130, 246, 0.2);
      margin-bottom: 2rem;
    }

    .event-header h1 {
      font-size: 2.5rem;
      font-weight: 700;
      background: var(--gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 0.5rem;
    }

    .event-header .sport-badge {
      display: inline-block;
      padding: 0.5rem 1rem;
      background: var(--gradient);
      border-radius: 20px;
      font-size: 0.875rem;
      font-weight: 600;
      text-transform: uppercase;
      margin-bottom: 1rem;
    }

    /* Status Badge */
    .status-badge {
      display: inline-block;
      padding: 0.5rem 1rem;
      border-radius: 8px;
      font-size: 0.875rem;
      font-weight: 600;
      text-transform: uppercase;
      margin-left: 1rem;
    }

    .status-scheduled {
      background: rgba(139, 92, 246, 0.2);
      color: #a78bfa;
    }

    .status-in_progress {
      background: rgba(16, 185, 129, 0.2);
      color: #10b981;
    }

    .status-completed {
      background: rgba(59, 130, 246, 0.2);
      color: #3b82f6;
    }

    /* Info Grid */
    .info-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 1.5rem;
      margin-bottom: 2rem;
    }

    .info-card {
      background: var(--bg-card);
      padding: 1.5rem;
      border-radius: 12px;
      border: 1px solid rgba(59, 130, 246, 0.2);
    }

    .info-card h3 {
      color: var(--text-secondary);
      font-size: 0.875rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 0.75rem;
    }

    .info-card .value {
      font-size: 1.25rem;
      font-weight: 600;
    }

    /* Sections */
    .section {
      background: var(--bg-card);
      padding: 2rem;
      border-radius: 16px;
      border: 1px solid rgba(59, 130, 246, 0.2);
      margin-bottom: 2rem;
    }

    .section h2 {
      font-size: 1.5rem;
      margin-bottom: 1.5rem;
      background: var(--gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* Bracket/Rounds */
    .rounds-list {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .round-item {
      display: flex;
      align-items: center;
      padding: 1rem;
      background: var(--bg-glass);
      border-radius: 8px;
      border: 1px solid rgba(59, 130, 246, 0.1);
    }

    .round-number {
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--gradient);
      border-radius: 50%;
      font-weight: 700;
      margin-right: 1rem;
    }

    .round-name {
      flex: 1;
      font-weight: 600;
    }

    /* Metadata */
    .metadata-list {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 1rem;
    }

    .metadata-item {
      padding: 1rem;
      background: var(--bg-glass);
      border-radius: 8px;
    }

    .metadata-item .label {
      color: var(--text-secondary);
      font-size: 0.875rem;
      margin-bottom: 0.25rem;
    }

    .metadata-item .value {
      font-weight: 600;
    }

    /* Loading */
    .loading {
      text-align: center;
      padding: 4rem;
      color: var(--text-secondary);
    }

    /* Footer */
    .footer {
      text-align: center;
      padding: 2rem;
      color: var(--text-secondary);
      border-top: 1px solid rgba(255, 255, 255, 0.1);
    }

    .footer a {
      color: var(--accent-blue);
      text-decoration: none;
    }

    /* Responsive */
    @media (max-width: 768px) {
      .container {
        padding: 1rem;
      }

      .event-header h1 {
        font-size: 1.75rem;
      }

      .info-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <canvas id="particles"></canvas>

  <div class="container">
    <!-- Back Button -->
    <a href="/championships" class="back-btn">
      ← Back to Championships
    </a>

    <!-- Event Header -->
    <div id="event-header" class="event-header">
      <div class="loading">Loading event details...</div>
    </div>

    <!-- Info Grid -->
    <div id="info-grid" class="info-grid"></div>

    <!-- Tournament Structure -->
    <div id="structure-section" class="section">
      <h2>🏆 Tournament Structure</h2>
      <div id="rounds-list" class="rounds-list"></div>
    </div>

    <!-- Additional Info -->
    <div id="metadata-section" class="section">
      <h2>📊 Additional Information</h2>
      <div id="metadata-list" class="metadata-list"></div>
    </div>

    <!-- Footer -->
    <div class="footer">
      <p>Built by <a href="https://oddsifylabs.com" target="_blank">Oddsify Labs</a></p>
      <p style="margin-top: 0.5rem; font-size: 0.875rem;">VIC Tour — Vegas Intelligence Console</p>
    </div>
  </div>

  <script>
    // Configuration
    const VIC_TOUR_API = window.location.origin;

    // Get championship ID from URL
    const urlParams = new URLSearchParams(window.location.search);
    const championshipId = urlParams.get('id');

    // Particle Background
    function initParticles() {
      const canvas = document.getElementById('particles');
      const ctx = canvas.getContext('2d');
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;

      const particles = [];
      const particleCount = 50;

      for (let i = 0; i < particleCount; i++) {
        particles.push({
          x: Math.random() * canvas.width,
          y: Math.random() * canvas.height,
          vx: (Math.random() - 0.5) * 0.5,
          vy: (Math.random() - 0.5) * 0.5,
          size: Math.random() * 2 + 1,
          opacity: Math.random() * 0.5 + 0.2
        });
      }

      function animate() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        particles.forEach(p => {
          p.x += p.vx;
          p.y += p.vy;

          if (p.x < 0 || p.x > canvas.width) p.vx *= -1;
          if (p.y < 0 || p.y > canvas.height) p.vy *= -1;

          ctx.beginPath();
          ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(59, 130, 246, ${p.opacity})`;
          ctx.fill();
        });

        requestAnimationFrame(animate);
      }

      animate();
    }

    // Load Championship Details
    async function loadChampionship() {
      if (!championshipId) {
        showError('No championship ID provided');
        return;
      }

      try {
        const response = await fetch(`${VIC_TOUR_API}/api/championships/${championshipId}`);
        const data = await response.json();
        
        if (data.success && data.data) {
          renderChampionship(data.data);
        } else {
          showError('Championship not found');
        }
      } catch (error) {
        console.error('Error loading championship:', error);
        showError('Unable to load championship details');
      }
    }

    // Render Championship
    function renderChampionship(champ) {
      // Header
      const header = document.getElementById('event-header');
      const now = new Date();
      const startDate = new Date(champ.start_date);
      const endDate = new Date(champ.end_date);
      
      let status = 'scheduled';
      let statusText = 'Scheduled';
      if (now >= startDate && now <= endDate) {
        status = 'in_progress';
        statusText = 'In Progress';
      } else if (now > endDate) {
        status = 'completed';
        statusText = 'Completed';
      }

      header.innerHTML = `
        <span class="sport-badge">${champ.sport.toUpperCase()}</span>
        <span class="status-badge status-${status}">${statusText}</span>
        <h1>${champ.name}</h1>
        <p style="color: var(--text-secondary); margin-top: 0.5rem;">${champ.year} Season</p>
      `;

      // Info Grid
      const infoGrid = document.getElementById('info-grid');
      infoGrid.innerHTML = `
        <div class="info-card">
          <h3>📅 Dates</h3>
          <div class="value">${formatDate(startDate)} → ${formatDate(endDate)}</div>
        </div>
        <div class="info-card">
          <h3>🏆 Format</h3>
          <div class="value">${champ.format}</div>
        </div>
        <div class="info-card">
          <h3>👥 Teams</h3>
          <div class="value">${champ.teams_count} participants</div>
        </div>
        <div class="info-card">
          <h3>📍 Status</h3>
          <div class="value">${getDaysText(startDate, now)}</div>
        </div>
        ${champ.champion ? `
        <div class="info-card">
          <h3>🏆 Champion</h3>
          <div class="value">${champ.champion}</div>
        </div>
        ` : ''}
        ${champ.runner_up ? `
        <div class="info-card">
          <h3>🥈 Runner-Up</h3>
          <div class="value">${champ.runner_up}</div>
        </div>
        ` : ''}
        ${champ.final_score ? `
        <div class="info-card">
          <h3>📊 Final Score</h3>
          <div class="value">${champ.final_score}</div>
        </div>
        ` : ''}
      `;

      // Tournament Structure / Rounds
      const roundsList = document.getElementById('rounds-list');
      if (champ.rounds) {
        const rounds = champ.rounds.split(',').map(r => r.trim());
        roundsList.innerHTML = rounds.map((round, index) => `
          <div class="round-item">
            <div class="round-number">${index + 1}</div>
            <div class="round-name">${round}</div>
          </div>
        `).join('');
      } else {
        document.getElementById('structure-section').style.display = 'none';
      }

      // Metadata
      const metadataList = document.getElementById('metadata-list');
      if (champ.metadata) {
        try {
          const meta = typeof champ.metadata === 'string' ? JSON.parse(champ.metadata) : champ.metadata;
          const entries = Object.entries(meta);
          
          if (entries.length > 0) {
            metadataList.innerHTML = entries.map(([key, value]) => {
              const label = key.replace(/_/g, ' ').replace(/\b\w/g, l => l.toUpperCase());
              const displayValue = Array.isArray(value) ? value.join(', ') : value;
              return `
                <div class="metadata-item">
                  <div class="label">${label}</div>
                  <div class="value">${displayValue}</div>
                </div>
              `;
            }).join('');
          } else {
            document.getElementById('metadata-section').style.display = 'none';
          }
        } catch (e) {
          document.getElementById('metadata-section').style.display = 'none';
        }
      } else {
        document.getElementById('metadata-section').style.display = 'none';
      }
    }

    // Format Date
    function formatDate(date) {
      return date.toLocaleDateString('en-US', { 
        month: 'short', 
        day: 'numeric', 
        year: 'numeric' 
      });
    }

    // Get Days Text
    function getDaysText(startDate, now) {
      const daysUntil = Math.ceil((startDate - now) / (1000 * 60 * 60 * 24));
      if (daysUntil > 0) return `Starts in ${daysUntil} days`;
      if (daysUntil === 0) return 'Starts today';
      if (daysUntil === -1) return 'Started yesterday';
      return `Started ${Math.abs(daysUntil)} days ago`;
    }

    // Show Error
    function showError(message) {
      document.getElementById('event-header').innerHTML = `
        <div class="loading" style="color: var(--danger);">
          ⚠️ ${message}
        </div>
      `;
    }

    // Initialize
    document.addEventListener('DOMContentLoaded', () => {
      initParticles();
      loadChampionship();
    });
  </script>
</body>
</html>
